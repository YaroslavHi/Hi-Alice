name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: alice
          POSTGRES_PASSWORD: test
          POSTGRES_DB: alice_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://alice:test@localhost:5432/alice_test
      REDIS_URL: redis://localhost:6379
      YANDEX_CLIENT_ID: test-client-id
      YANDEX_CLIENT_SECRET: test-client-secret-min16
      HI_LOGIN_URL: https://example.com/login
      SERVICE_BASE_URL: https://example.com
      TOKEN_ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      TOKEN_HMAC_KEY: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
      P4_RELAY_URL: http://localhost:4000
      P4_RELAY_TOKEN: test-relay-token-min16chars

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Apply DB schema
        run: node scripts/migrate.js

      - name: Run tests
        run: npx vitest run --reporter=verbose
