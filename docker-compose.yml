services:
  alice-adapter:
    build: .
    container_name: alice-adapter
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-p4:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:3000/v1.0 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - alice-net

  postgres:
    image: postgres:16-alpine
    container_name: alice-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: alice
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: alice_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alice -d alice_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alice-net

  redis:
    image: redis:7-alpine
    container_name: alice-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alice-net

  # P4 relay simulator — replace with your real P4 relay in production
  mock-p4:
    image: node:20-alpine
    container_name: mock-p4
    restart: unless-stopped
    working_dir: /app
    volumes:
      - /opt/mock-p4:/app
    command: node server.js
    networks:
      - alice-net

  # MQTT broker — used by real controller and Node-RED
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    volumes:
      - /opt/mosquitto/config:/mosquitto/config
      - mosquitto-data:/mosquitto/data
    ports:
      - "1883:1883"
    networks:
      - alice-net

  # Node-RED — MQTT monitor + state-change detection + Real Controller Relay
  # Set HOUSE_ID to the house_id registered in the houses DB table
  nodered:
    image: nodered/node-red:latest
    container_name: nodered
    restart: unless-stopped
    user: root
    volumes:
      - /opt/nodered:/data
    ports:
      - "1880:1880"
    environment:
      - NODE_RED_ENABLE_PROJECTS=false
      - HOUSE_ID=sb-TEST01
      - ALICE_ADAPTER_URL=http://alice-adapter:3000
      - P4_RELAY_TOKEN=hi-relay-token-test-2024
    depends_on:
      - mosquitto
    networks:
      - alice-net

volumes:
  postgres-data:
  redis-data:
  mosquitto-data:

networks:
  alice-net:
    driver: bridge
