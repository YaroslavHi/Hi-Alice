services:
  alice-adapter:
    build: .
    container_name: alice-adapter
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/v1.0', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - alice-net

  postgres:
    image: postgres:16-alpine
    container_name: alice-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     alice_svc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       hi_cloud
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alice_svc -d hi_cloud"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - alice-net

  redis:
    image: redis:7-alpine
    container_name: alice-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - alice-net

volumes:
  postgres-data:
  redis-data:

networks:
  alice-net:
    driver: bridge
